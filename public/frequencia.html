<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequência</title>
    <link rel="stylesheet" href="css/frequencia.css">
</head>
<body>

<main class="usuarios">

    <div style="display: flex; justify-content: flex-end; margin-bottom: 15px; width: 100%;">
        <button class="editar" onclick="window.location.href='menu.html'" style="cursor: pointer; padding: 8px 20px;">Voltar</button>
    </div>

    <div class="filtro">
        <input type="text" class="meu-input" id="nome" placeholder="Nome, data ou ex: >5">
        <select id="escolha" class="meu-input" title="Escolha uma opção">
            <option value="opcao1">Nome</option>
            <option value="opcao2">Data</option>
        </select>
    </div>

    <table class="tabela-usuarios">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Faltas</th>
                <th>Retiro</th> <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbody-usuarios"></tbody>
    </table>

    <table class="tabela-faltas">
        <thead>
            <tr>
                <th>Data</th>
                <th>Faltas</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbody-faltas"></tbody>
    </table>

</main>

<div id="modalUsuario" class="modal">
    <h2 id="modal-usuario-titulo"></h2>
    <div class="lista-rolagem" id="modal-usuario-lista"></div>
    <div class="botoes-edicao">
        <button onclick="salvarModalUsuario()">Salvar</button>
        <button class="cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<div id="modalData" class="modal">
    <h2 id="modal-data-titulo"></h2>
    <div class="lista-rolagem" id="modal-data-lista"></div>
    <div class="botoes-edicao">
        <button onclick="salvarModalData()">Salvar</button>
        <button class="cancelar" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script src="js/frequencia_calc.js"></script>
<script src="js/frequencia_api.js"></script>
<script src="js/frequencia_ui.js"></script>
</body>
</html>
