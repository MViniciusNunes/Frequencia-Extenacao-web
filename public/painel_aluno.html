<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Aluno</title>
    <link rel="stylesheet" href="css/frequencia.css"> 
    <link rel="stylesheet" href="css/painel_aluno.css"> 
</head>
<body>

<main class="usuarios">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="images/logo.png" alt="Logo Ágape" style="max-width: 120px;">
    </div>

    <div class="header-aluno">
        <h1 id="boas-vindas" class="titulo-aluno">Olá, Aluno!</h1>
        <button id="btn-acao-topo" class="cancelar" onclick="sair()" style="cursor: pointer;">Sair</button>
    </div>

    <div id="banner-retiro" class="banner-retiro banner-vazio">
        <h3 id="titulo-retiro" style="margin: 0 0 5px 0;">Status do Retiro</h3>
        <p id="mensagem-retiro" style="margin: 0; font-size: 1.1em;">Calculando presença...</p>
    </div>
    
    <div class="card-presenca">
        <h2 class="titulo-aluno" style="margin-top: 0;">Registrar Presença</h2>
        
        <div class="camera-placeholder">
            <p style="margin: 0;">📸 Câmera (Em Breve)</p>
        </div>

        <p>Ou digite o código do encontro fornecido pelo professor:</p>
        <div class="container-input-codigo">
            <input type="text" id="codigo-encontro" class="meu-input input-codigo" placeholder="Ex: KS8596L">
            <button class="editar" onclick="registrarPorCodigo()">Confirmar</button>
        </div>
    </div>

    <div class="placar-container">
        <div class="placar-card card-p">
            <h3 class="placar-titulo texto-p">Presenças (P)</h3>
            <h2 id="qtd-p" class="placar-numero texto-p">0</h2>
        </div>
        <div class="placar-card card-f">
            <h3 class="placar-titulo texto-f">Faltas (F)</h3>
            <h2 id="qtd-f" class="placar-numero texto-f">0</h2>
        </div>
        <div class="placar-card card-fj">
            <h3 class="placar-titulo texto-fj">Justificadas (FJ)</h3>
            <h2 id="qtd-fj" class="placar-numero texto-fj">0</h2>
        </div>
    </div>

    <table class="tabela-historico">
        <thead>
            <tr>
                <th>Data</th>
                <th>Encontro</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="tbody-historico">
            </tbody>
    </table>

</main>

<script src="js/painel_aluno.js"></script>
</body>
</html>
