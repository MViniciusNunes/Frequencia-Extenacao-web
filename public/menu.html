<!DOCTYPE html>
<html lang="pt-br">
    <head>

        <meta charset="UTF-8">
        <title>Administrador</title>
        <link
            rel="stylesheet"
            href="css/menu.css">

    </head>

    <body>

        <main class="dashboard">

            <img
                src="images/logo.png"
                class="logo">

            <h1> Painel Administrativo</h1>
            <button class="cancelar" onclick="sair()" style="cursor: pointer;">Sair</button>

                <section class="cards">

            <div class="card">

                <h2> Frequência</h2>

                <p>
                    Gerenciar faltas
                </p>

                <button onclick="abrirUsuarios()">
                    Abrir
                </button>

            </div>


            <div class="card">

                <h2>Gerar QR</h2>

                <p>
                    Novo encontro
                </p>

                <button onclick="gerarQR()">
                    Gerar
                </button>

            </div>


            <div class="card">

                <h2>
                    Usuário
                </h2>

                <p>
                    Gerencia Usuarios
                </p>

                <button onclick="apagarDados()">
                    Gerenciar
                </button>

            </div>

        </section>
        </main>
     <script src="js/menu.js"></script>
    </body>
</html>
