<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" href="css/frequencia.css"> 
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>

<main class="usuarios">

    <div style="display: flex; justify-content: flex-end; margin-bottom: 15px; width: 100%;">
        <button class="editar" onclick="window.location.href='menu.html'" style="cursor: pointer; padding: 8px 20px;">Voltar</button>
    </div>

    <div class="filtro">
        <input type="text" class="meu-input" id="nome" placeholder="Pesquisar usuário por nome...">
    </div>

    <table class="tabela-usuarios">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbody-usuarios">
            </tbody>
    </table>

</main>

<script src="js/usuarios.js"></script>
</body>
</html>
