<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários</title>
    <link rel="stylesheet" href="css/frequencia.css"> 
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>

<main class="usuarios">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%;">
        <button class="btn-criar" onclick="abrirModalCriacao()">+ Criar Usuário</button>
        <button class="editar" onclick="window.location.href='menu.html'" style="cursor: pointer; padding: 8px 20px;">Voltar</button>
    </div>

    <div class="filtro">
        <input type="text" class="meu-input" id="nome" placeholder="Pesquisar usuário por nome...">
    </div>

    <table class="tabela-usuarios">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tbody-usuarios">
        </tbody>
    </table>

</main>

<!-- Modal: Editar usuário -->
<div id="modalUsuario" class="modal">
    <h2>Editar Usuário</h2>

    <div class="campo-modal">
        <label>Nome</label>
        <input type="text" id="edit-nome" class="input-modal" placeholder="Nome completo">
    </div>
    <div class="campo-modal">
        <label>E-mail</label>
        <input type="email" id="edit-email" class="input-modal" placeholder="E-mail">
    </div>
    <div class="campo-modal">
        <label>Usuário</label>
        <input type="text" id="edit-usuario" class="input-modal" placeholder="Nome de usuário">
    </div>
    <div class="campo-modal">
        <label>Nova Senha <span class="label-opcional">(deixe em branco para manter)</span></label>
        <input type="password" id="edit-senha" class="input-modal" placeholder="••••••••">
    </div>
    <div class="campo-modal campo-toggle">
        <label>Administrador</label>
        <label class="toggle">
            <input type="checkbox" id="edit-isAdmin">
            <span class="slider"></span>
        </label>
    </div>

    <div class="botoes-edicao">
        <button class="btn-excluir" onclick="confirmarExclusaoModal()">Excluir</button>
        <button class="cancelar" onclick="fecharModal()">Cancelar</button>
        <button onclick="salvarEdicao()">Salvar</button>
    </div>
</div>

<!-- Modal: Criar usuário -->
<div id="modalCriar" class="modal">
    <h2>Novo Usuário</h2>

    <div class="campo-modal">
        <label>Nome</label>
        <input type="text" id="criar-nome" class="input-modal" placeholder="Nome completo">
    </div>
    <div class="campo-modal">
        <label>E-mail</label>
        <input type="email" id="criar-email" class="input-modal" placeholder="E-mail">
    </div>
    <div class="campo-modal">
        <label>Usuário</label>
        <input type="text" id="criar-usuario" class="input-modal" placeholder="Nome de usuário">
    </div>
    <div class="campo-modal">
        <label>Senha</label>
        <input type="password" id="criar-senha" class="input-modal" placeholder="••••••••">
    </div>
    <div class="campo-modal campo-toggle">
        <label>Administrador</label>
        <label class="toggle">
            <input type="checkbox" id="criar-isAdmin">
            <span class="slider"></span>
        </label>
    </div>

    <div class="botoes-edicao">
        <button class="cancelar" onclick="fecharModal()">Cancelar</button>
        <button onclick="criarUsuario()">Criar</button>
    </div>
</div>

<div id="overlay" class="overlay" onclick="fecharModal()"></div>

<script src="js/usuarios.js"></script>
</body>
</html>
